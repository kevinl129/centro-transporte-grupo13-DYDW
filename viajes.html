<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Terminal Central - Consulta de Viajes</title>
    <link rel="stylesheet" href="style-centro.css">
</head>
<body>
    <script src="viajes.js"></script>
    <header>
        <div class="logo">Terminal Central BA</div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="viajes.html">Consulta de Viajes</a></li>
                <li><a href="servicios.html">Servicios y Mapa</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="tarjeta">
            <h1>Planificador de Viajes</h1>
            <p>Seleccioná tu punto de partida y tu destino para obtener la mejor ruta.</p>
            
            <form id="form-viajes" onsubmit="buscarViaje(event)">
                <label for="origen">Origen:</label>
                <select id="origen" required>
                    <option value="" disabled selected>Seleccioná el origen</option>
                    <option value="terminal">Terminal Central</option>
                    <option value="hospitales">Hospitales (Sur)</option>
                </select>

                <label for="destino">Destino:</label>
                <select id="destino" required>
                    <option value="" disabled selected>Seleccioná el destino</option>
                    <option value="facultad">Facultad de Derecho (Norte)</option>
                    <option value="terminal">Terminal Central</option>
                </select>

                <button type="submit">Buscar Viaje</button>
            </form>
        </div>

        <div id="resultado-busqueda" class="tarjeta" style="display: none;"></div>
    </main>

</body>
</html>
